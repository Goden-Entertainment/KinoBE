name: Build and Push KinoBE

on:
  push:
    branches: [ dev, prod, docker-setup ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/goden-entertainment/kinobe:latest
            ghcr.io/goden-entertainment/kinobe:${{ github.sha }}

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_IP }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/kino
            cat > .env << EOF
            PROD_DATABASE_URL=$PROD_DATABASE_URL
            PROD_USERNAME=$PROD_USERNAME
            PROD_PASSWORD=$PROD_PASSWORD
            EOF
            docker compose pull
            docker compose up -d
            docker image prune -f
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          PROD_USERNAME: ${{ secrets.PROD_USERNAME }}
          PROD_PASSWORD: ${{ secrets.PROD_PASSWORD }}